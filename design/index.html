<script>
  // Apply theme before paint to avoid flash
  (function() {
    try {
      let t = JSON.parse(localStorage.getItem("it.theme")) || "mono"; const map={neumorph:"editorial",terminal:"mono",brutalist:"grid"}; if (map[t]) t = map[t];
      const d = JSON.parse(localStorage.getItem("it.density")) || "default";
      document.documentElement.setAttribute("data-theme", t);
      document.documentElement.setAttribute("data-density", d);
    } catch(e) {
      document.documentElement.setAttribute("data-theme", "aurora");
    }
  })();
</script>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="app.js?v=28"></script>

<script>
  // -------- Build home --------
  function favsHTML() {
    const favs = AppState.favorites();
    if (!favs.length) return "";
    const cards = favs.map(id => {
      const t = TOOLS.find(x => x.id === id);
      return t ? cardHTML(t) : "";
    }).join("");
    return `
      <h2 class="section-title section-title-sub">Pinned</h2>
      <div class="tool-grid">${cards}</div>
    `;
  }

  function recentsHTML() {
    const r = AppState.recents();
    if (!r.length) return "";
    return `
      <h2 class="section-title section-title-sub">Recently used</h2>
      <div class="panel">
        ${r.slice(0,5).map(e => {
          const t = TOOLS.find(x => x.id === e.toolId);
          if (!t) return "";
          const ago = timeAgo(e.t);
          return `<a class="recent-row" href="${t.path}" style="text-decoration:none;">
            <span class="recent-icon">${t.svg || ''}</span>
            <span class="mono">${escapeHtml(e.preview)}</span>
            <span class="muted">${t.name}</span>
            <time>${ago}</time>
          </a>`;
        }).join("")}
      </div>
    `;
  }
  function timeAgo(t) {
    const s = Math.round((Date.now() - t) / 1000);
    if (s < 60) return s + "s ago";
    if (s < 3600) return Math.round(s/60) + "m ago";
    if (s < 86400) return Math.round(s/3600) + "h ago";
    return Math.round(s/86400) + "d ago";
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function cardHTML(t) {
    const starred = AppState.favorites().includes(t.id);
    return `
      <a class="tool-card ${starred ? 'starred' : ''}" data-name="${t.id}" href="${t.path}">
        <div class="tc-icon">${t.svg || ''}</div>
        <h3 class="tc-name">${t.name}</h3>
        <p class="tc-desc">${t.desc}</p>
        ${toolPreview(t)}
        <button class="tc-star" data-id="${t.id}" title="${starred ? 'Unfavorite' : 'Favorite'}">${starred ? '★' : '☆'}</button>
      </a>`;
  }
  function categoriesHTML() {
    return CATEGORIES.map(cat => {
      const items = TOOLS.filter(t => t.cat === cat);
      if (!items.length) return "";
      return `
        <h2 class="section-title section-title-sub">${cat}</h2>
        <div class="tool-grid">${items.map(cardHTML).join("")}</div>
      `;
    }).join("");
  }

  Layout.render({
    activeId: "home",
    title: "All-in-one developer toolbox",
    sub: "26 single-purpose utilities for the work in between the work — all running locally in your browser.",
    bodyHTML: favsHTML() + recentsHTML() + categoriesHTML()
  });

  // wire star buttons
  document.addEventListener("click", e => {
    const btn = e.target.closest(".tc-star");
    if (!btn) return;
    e.preventDefault();
    const starred = AppState.toggleFav(btn.dataset.id);
    location.reload();
  });
</script>
