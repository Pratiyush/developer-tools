<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Workbench — Design Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=IBM+Plex+Mono:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="designs/styles.css">
<style>
  html, body { margin: 0; background: #0e0e10; color: #fff; font-family: "Geist", system-ui, sans-serif; }
  #canvas-root { width: 100vw; height: 100vh; }

  /* =====================================================
     DIRECTION — WORKBENCH PRO (dark, Linear-grade)
     ===================================================== */
  .pro {
    width: 100%; height: 100%;
    background: #0a0a0b; color: #ededed;
    font-family: "Geist", system-ui, sans-serif;
    font-size: 14px; line-height: 1.55;
    --acc: #818cf8; --acc-glow: rgba(129,140,248,0.30);
    --line: rgba(255,255,255,0.07); --line-2: rgba(255,255,255,0.13);
    --dim: #a1a1a1; --faint: #6b6b6b;
    --bg-2: #131316; --bg-3: #19191d;
  }
  .pro * { box-sizing: border-box; }
  .pro a { color: inherit; text-decoration: none; }
  .pro button { font: inherit; color: inherit; cursor: pointer; background: none; border: 0; padding: 0; }
  .pro .layout { display: grid; grid-template-columns: 244px 1fr; height: 100%; }
  .pro aside { border-right: 1px solid var(--line); padding: 16px 12px; display: flex; flex-direction: column; gap: 18px; background: #0a0a0b; overflow-y: auto; }
  .pro .brand { display: flex; align-items: center; gap: 10px; padding: 6px 8px; font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
  .pro .brand-mark { width: 22px; height: 22px; border-radius: 6px; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: grid; place-items: center; box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 4px 14px rgba(99,102,241,0.4); }
  .pro .brand-mark svg { width: 12px; height: 12px; }
  .pro .brand .ver { margin-left: auto; font-size: 10px; color: var(--faint); border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; font-family: "Geist Mono", monospace; }
  .pro .search { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 7px; color: var(--dim); font-size: 12.5px; }
  .pro .search .k { margin-left: auto; font-family: "Geist Mono", monospace; font-size: 10.5px; background: var(--bg-3); padding: 1px 5px; border-radius: 3px; border: 1px solid var(--line); }
  .pro .nav-h { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--faint); padding: 14px 10px 6px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .pro .nav-h .pin { color: #fbbf24; font-size: 10px; }
  .pro .nav-i { display: flex; align-items: center; gap: 9px; padding: 6px 10px; border-radius: 6px; color: var(--dim); font-size: 13px; transition: all 120ms; position: relative; }
  .pro .nav-i:hover { background: var(--bg-2); color: #ededed; }
  .pro .nav-i.act { background: rgba(255,255,255,0.06); color: #fff; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.07); }
  .pro .nav-i.act::before { content: ""; position: absolute; left: -1px; top: 7px; bottom: 7px; width: 2px; background: var(--acc); border-radius: 2px; }
  .pro .nav-i .ico { width: 14px; flex: none; opacity: 0.85; font-family: "Geist Mono", monospace; font-size: 12px; text-align: center; color: var(--faint); }
  .pro .nav-i.act .ico { color: var(--acc); }
  .pro .nav-i .star { margin-left: auto; color: #fbbf24; opacity: 0; font-size: 11px; }
  .pro .nav-i.fav .star { opacity: 1; }
  .pro main { overflow-y: auto; padding: 0; }
  .pro .topbar { display: flex; align-items: center; gap: 12px; padding: 12px 32px; border-bottom: 1px solid var(--line); height: 49px; background: rgba(10,10,11,0.7); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 5; }
  .pro .crumbs { font-size: 12px; color: var(--dim); font-family: "Geist Mono", monospace; }
  .pro .crumbs span.sep { color: var(--faint); margin: 0 6px; }
  .pro .topbar .ic-btn { width: 28px; height: 28px; display: grid; place-items: center; background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px; color: var(--dim); font-size: 12px; }
  .pro .body { padding: 36px 32px 48px; max-width: 1240px; }
  .pro h1.title { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 8px; }
  .pro .sub { color: var(--dim); margin: 0 0 28px; max-width: 60ch; font-size: 14.5px; }
  .pro .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .pro .stat { border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent); }
  .pro .stat .lbl { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--faint); font-weight: 600; }
  .pro .stat .val { font-size: 24px; font-weight: 600; margin-top: 4px; letter-spacing: -0.01em; font-family: "Geist Mono", monospace; }
  .pro .stat .delta { font-size: 11px; color: #34d399; font-family: "Geist Mono", monospace; margin-top: 2px; }
  .pro .sect-h { display: flex; align-items: center; gap: 10px; margin: 32px 0 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--faint); font-weight: 600; }
  .pro .sect-h::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .pro .sect-h .count { font-family: "Geist Mono", monospace; font-size: 10px; color: var(--faint); padding: 1px 5px; border: 1px solid var(--line); border-radius: 3px; }
  .pro .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .pro .card { border: 1px solid var(--line); border-radius: 8px; padding: 16px 18px; background: rgba(255,255,255,0.015); transition: all 180ms; display: flex; flex-direction: column; gap: 6px; position: relative; min-height: 110px; }
  .pro .card:hover { background: rgba(255,255,255,0.04); border-color: var(--line-2); transform: translateY(-1px); }
  .pro .card .c-ico { width: 28px; height: 28px; display: grid; place-items: center; border: 1px solid var(--line); border-radius: 6px; color: var(--acc); font-family: "Geist Mono", monospace; font-size: 12px; margin-bottom: 4px; }
  .pro .card .c-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
  .pro .card .c-desc { color: var(--dim); font-size: 12.5px; line-height: 1.5; }
  .pro .card .c-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .pro .card .tag { font-size: 10px; font-family: "Geist Mono", monospace; color: var(--faint); border: 1px solid var(--line); border-radius: 3px; padding: 1px 5px; }
  .pro .card .star { position: absolute; top: 12px; right: 12px; color: #fbbf24; opacity: 0; font-size: 13px; }
  .pro .card.fav .star { opacity: 1; }
  .pro .footer-c { margin-top: auto; padding: 12px 10px 4px; border-top: 1px solid var(--line); font-size: 10.5px; color: var(--faint); line-height: 1.5; }
  .pro .footer-c .h { color: var(--acc); }
  .pro .footer-c .d { font-size: 10px; opacity: 0.65; margin-top: 4px; }
  .pro .tool { display: grid; gap: 16px; max-width: 880px; }
  .pro .panel { border: 1px solid var(--line); border-radius: 8px; background: rgba(255,255,255,0.02); padding: 16px 18px; }
  .pro .panel-l { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--faint); font-weight: 600; margin-bottom: 10px; }
  .pro input, .pro textarea, .pro select { width: 100%; background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; color: #ededed; font-family: "Geist Mono", monospace; font-size: 13px; outline: none; }
  .pro input:focus, .pro textarea:focus { border-color: var(--acc); box-shadow: 0 0 0 3px var(--acc-glow); }
  .pro textarea { resize: vertical; min-height: 80px; }
  .pro .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 6px; background: var(--bg-2); border: 1px solid var(--line); font-size: 13px; font-weight: 500; transition: all 150ms; }
  .pro .btn:hover { border-color: var(--line-2); background: var(--bg-3); }
  .pro .btn.primary { background: var(--acc); border-color: var(--acc); color: #fff; font-weight: 600; }
  .pro .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .pro .hash-row { display: grid; grid-template-columns: 60px 1fr 24px; gap: 10px; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--line); }
  .pro .hash-row:last-child { border-bottom: 0; }
  .pro .hash-row .alg { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--faint); font-weight: 600; font-family: "Geist Mono", monospace; }
  .pro .hash-row .v { font-family: "Geist Mono", monospace; font-size: 12px; color: #ededed; word-break: break-all; }

  /* =====================================================
     DIRECTION — WORKBENCH EDITORIAL (light, premium)
     ===================================================== */
  .ed {
    width: 100%; height: 100%; background: #faf7f2; color: #1a1814;
    font-family: "Geist", system-ui, sans-serif; font-size: 15px; line-height: 1.6;
    --acc: #b8472b; --serif: "Fraunces", "Newsreader", Georgia, serif;
    --line: rgba(26,24,20,0.10); --line-2: rgba(26,24,20,0.18);
    --dim: #5a544c; --faint: #9b948a; --paper: #fffefb;
  }
  .ed * { box-sizing: border-box; }
  .ed a { color: inherit; text-decoration: none; }
  .ed button { font: inherit; color: inherit; cursor: pointer; background: none; border: 0; padding: 0; }
  .ed .layout { display: grid; grid-template-columns: 256px 1fr; height: 100%; }
  .ed aside { padding: 28px 22px; background: #f3efe7; border-right: 1px solid var(--line); display: flex; flex-direction: column; gap: 22px; overflow-y: auto; }
  .ed .brand { display: flex; align-items: baseline; gap: 8px; font-family: var(--serif); font-style: italic; font-size: 26px; font-weight: 500; letter-spacing: -0.015em; }
  .ed .brand .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--acc); align-self: center; }
  .ed .brand .ver { margin-left: auto; font-family: "Geist Mono", monospace; font-style: normal; font-size: 10px; color: var(--faint); border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; align-self: center; }
  .ed .search { display: flex; align-items: center; gap: 8px; padding: 9px 14px; background: var(--paper); border: 1px solid var(--line); border-radius: 999px; color: var(--dim); font-size: 13px; }
  .ed .search .k { margin-left: auto; font-family: "Geist Mono", monospace; font-size: 10.5px; color: var(--faint); }
  .ed .nav-h { font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--dim); padding: 14px 4px 6px; font-weight: 500; }
  .ed .nav-i { display: flex; align-items: baseline; gap: 12px; padding: 5px 8px; color: var(--dim); font-size: 14px; border-radius: 4px; transition: all 120ms; }
  .ed .nav-i:hover { color: var(--acc); }
  .ed .nav-i.act { color: var(--acc); font-weight: 500; }
  .ed .nav-i .num { font-family: "Geist Mono", monospace; font-size: 10.5px; color: var(--faint); width: 18px; }
  .ed .nav-i.act .num { color: var(--acc); }
  .ed main { overflow-y: auto; padding: 56px 64px 80px; max-width: 1100px; }
  .ed .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .ed .crumbs { font-family: "Geist Mono", monospace; font-size: 12px; color: var(--dim); }
  .ed .crumbs .sep { color: var(--faint); margin: 0 8px; }
  .ed .ic-btn { width: 36px; height: 36px; display: grid; place-items: center; background: var(--paper); border: 1px solid var(--line); border-radius: 999px; color: var(--dim); font-size: 13px; }
  .ed .eyebrow { font-family: "Geist Mono", monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--acc); margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
  .ed .eyebrow::after { content: ""; width: 28px; height: 1px; background: var(--acc); }
  .ed h1.hero { font-family: var(--serif); font-weight: 400; font-size: 56px; letter-spacing: -0.025em; line-height: 1.05; margin: 0 0 18px; text-wrap: balance; max-width: 16ch; }
  .ed h1.hero em { font-style: italic; color: var(--acc); }
  .ed .lede { font-size: 18px; line-height: 1.55; color: var(--dim); margin: 0 0 40px; max-width: 56ch; text-wrap: pretty; }
  .ed .sect-h { font-family: var(--serif); font-style: italic; font-size: 22px; font-weight: 500; margin: 48px 0 18px; letter-spacing: -0.01em; display: flex; align-items: baseline; gap: 14px; }
  .ed .sect-h .num { font-family: "Geist Mono", monospace; font-style: normal; font-size: 11px; color: var(--faint); letter-spacing: 0.08em; }
  .ed .sect-h::after { content: ""; flex: 1; height: 1px; background: var(--line); transform: translateY(-6px); }
  .ed .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .ed .card { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: 22px; display: flex; flex-direction: column; gap: 6px; transition: all 200ms; position: relative; min-height: 132px; }
  .ed .card:hover { border-color: var(--line-2); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(26,24,20,0.07); }
  .ed .card .c-ico { font-family: "Geist Mono", monospace; font-size: 11px; letter-spacing: 0.06em; color: var(--faint); margin-bottom: 4px; text-transform: uppercase; }
  .ed .card .c-name { font-family: var(--serif); font-weight: 500; font-size: 22px; letter-spacing: -0.02em; line-height: 1.2; }
  .ed .card .c-desc { color: var(--dim); font-size: 14px; line-height: 1.5; text-wrap: pretty; }
  .ed .card .arrow { position: absolute; top: 22px; right: 22px; color: var(--faint); transition: all 200ms; }
  .ed .card:hover .arrow { color: var(--acc); transform: translate(2px, -2px); }
  .ed .footer-c { margin-top: auto; padding: 18px 4px 0; font-family: var(--serif); font-style: italic; font-size: 13px; color: var(--dim); border-top: 1px solid var(--line); line-height: 1.6; }
  .ed .footer-c .h { color: var(--acc); }
  .ed .footer-c .d { font-size: 11px; font-family: "Geist", sans-serif; font-style: normal; opacity: 0.7; margin-top: 6px; }
  .ed .tool { display: grid; gap: 18px; max-width: 720px; }
  .ed .panel { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: 24px 26px; }
  .ed .panel-l { font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--dim); margin-bottom: 10px; }
  .ed input, .ed textarea, .ed select { width: 100%; background: var(--paper); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; color: #1a1814; font-family: "IBM Plex Mono", monospace; font-size: 14px; outline: none; }
  .ed input:focus, .ed textarea:focus { border-color: var(--acc); box-shadow: 0 0 0 3px rgba(184,71,43,0.15); }
  .ed textarea { resize: vertical; min-height: 90px; }
  .ed .btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px; border-radius: 999px; background: var(--paper); border: 1px solid var(--line); font-size: 13px; font-weight: 500; }
  .ed .btn.primary { background: var(--acc); color: #fff; border-color: var(--acc); }
  .ed .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .ed .hash-row { display: grid; grid-template-columns: 70px 1fr 24px; gap: 12px; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--line); }
  .ed .hash-row:last-child { border-bottom: 0; }
  .ed .hash-row .alg { font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--dim); }
  .ed .hash-row .v { font-family: "IBM Plex Mono", monospace; font-size: 12.5px; color: #1a1814; word-break: break-all; }
</style>
</head>
<body>
<div id="canvas-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="designs/linear.jsx"></script>
<script type="text/babel" src="designs/paper.jsx"></script>
<script type="text/babel" src="designs/swiss.jsx"></script>
<script type="text/babel" src="designs/vercel.jsx"></script>

<script type="text/babel">
const TOOLS = [
  { ico: "##",  name: "Hash text",         desc: "MD5, SHA-1, SHA-256, SHA-512 in your browser.", cat: "Crypto", fav: true },
  { ico: "[/]", name: "Encrypt / decrypt", desc: "AES-style symmetric encryption with passphrase.", cat: "Crypto" },
  { ico: "{}",  name: "JWT parser",        desc: "Decode and inspect a JSON Web Token.", cat: "Crypto", fav: true },
  { ico: "::",  name: "Bcrypt",            desc: "Generate and verify bcrypt-style hashes.", cat: "Crypto" },
  { ico: "<>",  name: "Base64 string",     desc: "Encode and decode base64 text.", cat: "Converter" },
  { ico: "/\\\\",name: "JSON ↔ YAML",       desc: "Convert JSON to YAML and back.", cat: "Converter" },
  { ico: "**",  name: "Color converter",   desc: "HEX, RGB, HSL, OKLCH all at once.", cat: "Converter", fav: true },
  { ico: "Aa",  name: "Case converter",    desc: "camel, snake, kebab, Pascal, CONST…", cat: "Converter" },
];

function ProDirection({ view = "home" }) {
  return (
    <div className="pro">
      <div className="layout">
        <aside>
          <div className="brand">
            <div className="brand-mark">
              <svg viewBox="0 0 12 12" fill="none">
                <path d="M2 3.5 L6 1 L10 3.5 L10 8.5 L6 11 L2 8.5 Z" stroke="#fff" strokeWidth="1.2" strokeLinejoin="round"/>
                <circle cx="6" cy="6" r="1.4" fill="#fff"/>
              </svg>
            </div>
            <span>Workbench</span>
            <span className="ver">v26.5</span>
          </div>
          <div className="search">
            <span style={{opacity:0.5}}>⌕</span><span>Find a tool…</span>
            <span className="k">⌘K</span>
          </div>
          <div className="nav-h"><span className="pin">★</span> PINNED</div>
          <div>
            <a className={"nav-i fav" + (view === "home" ? "" : " act")}><span className="ico">#</span>Hash text<span className="star">★</span></a>
            <a className="nav-i fav"><span className="ico">{"{}"}</span>JWT parser<span className="star">★</span></a>
            <a className="nav-i fav"><span className="ico">**</span>Color converter<span className="star">★</span></a>
          </div>
          <div className="nav-h">CRYPTO</div>
          <div>
            <a className="nav-i"><span className="ico">[/]</span>Encrypt</a>
            <a className="nav-i"><span className="ico">::</span>Bcrypt</a>
          </div>
          <div className="nav-h">CONVERTER</div>
          <div>
            <a className="nav-i"><span className="ico">{"<>"}</span>Base64</a>
            <a className="nav-i"><span className="ico">{"/\\"}</span>JSON ↔ YAML</a>
            <a className="nav-i"><span className="ico">Aa</span>Case</a>
          </div>
          <div className="footer-c">
            Made with <span className="h">♥</span> by Prathyosh
            <div className="d">All processing runs locally. No data leaves your browser.</div>
          </div>
        </aside>
        <main>
          <div className="topbar">
            <div className="crumbs">
              <span>Home</span>
              {view === "tool" && <><span className="sep">/</span><span>Crypto</span><span className="sep">/</span><span style={{color:"#ededed"}}>Hash text</span></>}
            </div>
            <div style={{marginLeft:"auto", display:"flex", gap:8}}>
              <button className="ic-btn">⌘K</button>
              <button className="ic-btn">⚙</button>
            </div>
          </div>
          {view === "home" ? <ProHome /> : <ProTool />}
        </main>
      </div>
    </div>
  );
}

function ProHome() {
  return (
    <div className="body">
      <h1 className="title">All-in-one developer toolbox</h1>
      <p className="sub">26 single-purpose utilities for the work in between the work — all running locally in your browser.</p>
      <div className="stat-row">
        <div className="stat"><div className="lbl">Tools</div><div className="val">26</div><div className="delta">+3 new</div></div>
        <div className="stat"><div className="lbl">Pinned</div><div className="val">3</div></div>
        <div className="stat"><div className="lbl">Used today</div><div className="val">12</div><div className="delta">↑ 24%</div></div>
        <div className="stat"><div className="lbl">Bytes processed</div><div className="val">1.4M</div><div className="delta" style={{color:"#a1a1a1"}}>locally only</div></div>
      </div>
      <div className="sect-h">PINNED <span className="count">3</span></div>
      <div className="grid">
        {TOOLS.filter(t => t.fav).map((t,i) => (
          <a key={i} className="card fav">
            <div className="c-ico">{t.ico}</div>
            <div className="c-name">{t.name}</div>
            <div className="c-desc">{t.desc}</div>
